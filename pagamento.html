<!DOCTYPE html>
<html lang="PT-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagamento BLT</title>
<link rel="stylesheet" href="Css/pagamento.css">
<style>
body {
    font-family: Arial;
    text-align: center;
}

#qrcode, #cartaoForm {
    display: none;
    margin-top: 20px;
}
</style>

</head>
<body>

<h2>Assine Blue Light Premium</h2>
<p>Digite seu email e escolha a forma de pagamento</p>

<!-- FORM PRINCIPAL -->
<form onsubmit="return verificarPagamento(event)">

<label>Email:</label><br>
<input type="email" id="email" required><br><br>

<label>Confirme o email:</label><br>
<input type="email" id="confirmarEmail" required><br><br>

<h3>Método de Pagamento</h3><br>

<div class="botoes-pagamento">

<input type="radio" id="op1" name="pagamento" value="cartao">
<label for="op1">Cartão de crédito</label>

<input type="radio" id="op2" name="pagamento" value="pix">
<label for="op2">PIX</label>

</div>

<button type="submit">Continuar Pagamento</button>

</form>

<hr>

<!-- PIX -->
<div id="qrcode">
    <h3>Pagamento via PIX</h3>
    <p>Escaneie o QR Code abaixo:</p>
    <img id="imgQR" src="" alt="QR Code"><br><br>
    <button onclick="finalizar()">Já paguei</button>
</div>

<!-- CARTÃO -->
<div id="cartaoForm">

<h3>Cartão de Crédito</h3>

<label>Nome do cartão</label><br>
<input type="text"
oninput="this.value = this.value.replace(/[^a-zA-ZÀ-ÿ\s]/g, '')"
required><br><br>

<label>Número do cartão</label><br>
<input type="text" maxlength="16"
oninput="this.value = this.value.replace(/[^0-9]/g, '')"
required><br><br>

<label>Validade:</label><br>
<input type="month" required><br><br>

<label>CVV:</label><br>
<input type="text" maxlength="3"
oninput="this.value = this.value.replace(/[^0-9]/g, '')"
required><br><br>

<button onclick="finalizar()">Pagar</button>

</div>

<script>
function verificarPagamento(event) {
    event.preventDefault();

    let metodo = document.querySelector('input[name="pagamento"]:checked').value;

    if (metodo === "pix") {
        let chavePix = "BLT-PAGAMENTO-123";
        let url = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + chavePix;

        document.getElementById("imgQR").src = url;
        document.getElementById("qrcode").style.display = "block";
        document.getElementById("cartaoForm").style.display = "none";

    } else {
        document.getElementById("cartaoForm").style.display = "block";
        document.getElementById("qrcode").style.display = "none";
    }
}

function finalizar() {
    window.location.href = "login.html";
}
</script>

</body>
</html>
