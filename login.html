<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'> 
    <link rel="stylesheet" href="Css/login.css">

    <title>Document</title>
</head>
<body>
    
    <div>
        <main class="container">

            <form action="Index.html">  

                <h1>Cadastro</h1>

                <div class="input-box">
                    <input placeholder="Informe seu E-mail" type="email" name="email" required>
                    <i class="bx bxs-user"></i>
                </div>

                <div class="input-box">
                    <input placeholder=" Crie sua Senha" type="password" name="password" required>
                    <i class="bx bxs-lock-alt"></i>
                    <input placeholder=" Confirme sua senha " type="password" name="password" required>
                    <i class="bx bxs-lock-alt"></i>
                </div>

                <div class="remember-forgot">
                    <label> 
                        <input type="checkbox" required>
                        Lembrar minha senha
                    </label>

                   
                </div>

                <button type="submit" class="login">
                    Criar conta
                </button>
                
               
                

            </form>

        </main>
    </div>
    
</body>
</html>
